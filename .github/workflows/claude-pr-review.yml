name: Claude PR Review

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure git credentials
        run: git config --global url."https://x-access-token:${{ secrets.CLAUDE_GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Run Claude PR Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            Please review this pull request. For each file changed:
            - Identify bugs, logic errors, or security issues
            - Note any code quality concerns or anti-patterns
            - Suggest improvements where relevant
            - Call out anything that looks good

            Be concise and actionable. Post your review as a comment on the PR.
